---
name: Build and push images
on:
  push:
    branches: [main]
    paths: [images/**, .github/workflows/images.yaml]
  pull_request:
    branches: [main]
    paths: [images/**, .github/workflows/images.yaml]
jobs:
  build-base:
    name: Build and push base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Inject slug variables
        uses: rlespinasse/github-slug-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for base image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/base
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.number }}-${{ env.GITHUB_HEAD_REF_SLUG }},enable=${{ github.event_name == 'pull_request' }}
      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: images/base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base
  build-python:
    name: Build and push python image
    needs: [build-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Inject slug variables
        uses: rlespinasse/github-slug-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine base image tag
        id: base-tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.number }}-$GITHUB_HEAD_REF_SLUG" >> $GITHUB_OUTPUT
          fi
      - name: Extract metadata for python image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/python
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.number }}-${{ env.GITHUB_HEAD_REF_SLUG }},enable=${{ github.event_name == 'pull_request' }}
      - name: Build and push python image
        uses: docker/build-push-action@v5
        with:
          context: images/python
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: wowkmang:base=docker-image://ghcr.io/${{ github.repository }}/base:${{
            steps.base-tag.outputs.tag }}
          cache-from: type=gha,scope=python
          cache-to: type=gha,mode=max,scope=python
